<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#iconGradient)"/>
  
  <!-- MIDI Note Symbol (left side) -->
  <g transform="translate(4, 8)">
    <!-- Note head -->
    <ellipse cx="4" cy="14" rx="2.5" ry="2" fill="white"/>
    <!-- Stem -->
    <rect x="6" y="4" width="1.5" height="10" fill="white"/>
    <!-- Flag -->
    <path d="M7.5 4 Q10 6 7.5 8" fill="white"/>
  </g>
  
  <!-- Arrow -->
  <path d="M14 16 L18 16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M17 14 L19 16 L17 18" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bracket Notation (right side) -->
  <g transform="translate(20, 11)">
    <!-- Opening bracket -->
    <path d="M0 0 L0 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Closing bracket -->
    <path d="M8 0 L8 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- @ symbol to represent duration -->
    <circle cx="4" cy="5" r="2" stroke="white" stroke-width="1" fill="none"/>
    <path d="M5.5 5 Q6 5 6 4" stroke="white" stroke-width="1" fill="none"/>
  </g>
</svg>
