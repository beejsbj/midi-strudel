<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="iconGradient512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow512">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="96" fill="url(#iconGradient512)"/>
  
  <!-- Musical Note (left side) -->
  <g transform="translate(64, 128)" filter="url(#shadow512)">
    <!-- Note head -->
    <ellipse cx="64" cy="224" rx="40" ry="32" fill="white"/>
    <!-- Stem -->
    <rect x="96" y="64" width="24" height="160" fill="white"/>
    <!-- Flag/Beam -->
    <path d="M120 64 Q160 96 120 128" fill="white" stroke="white" stroke-width="4"/>
  </g>
  
  <!-- Transformation Arrow -->
  <g transform="translate(224, 256)">
    <path d="M0 0 L64 0" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
    <path d="M48 -20 L72 0 L48 20" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Bracket Notation (right side) -->
  <g transform="translate(320, 176)" filter="url(#shadow512)">
    <!-- Opening bracket -->
    <path d="M0 0 L0 160" stroke="white" stroke-width="24" stroke-linecap="square"/>
    <path d="M0 0 L32 0" stroke="white" stroke-width="24" stroke-linecap="square"/>
    <path d="M0 160 L32 160" stroke="white" stroke-width="24" stroke-linecap="square"/>
    
    <!-- @ symbol in the middle -->
    <circle cx="64" cy="80" r="32" stroke="white" stroke-width="16" fill="none"/>
    <path d="M88 80 Q104 80 104 56" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
    
    <!-- Closing bracket -->
    <path d="M128 0 L128 160" stroke="white" stroke-width="24" stroke-linecap="square"/>
    <path d="M96 0 L128 0" stroke="white" stroke-width="24" stroke-linecap="square"/>
    <path d="M96 160 L128 160" stroke="white" stroke-width="24" stroke-linecap="square"/>
  </g>
  
  <!-- Small text hint at bottom -->
  <text x="256" y="450" font-family="system-ui" font-size="32" fill="white" text-anchor="middle" opacity="0.8">
    MIDI → [ ]@
  </text>
</svg>
