<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Musical Notes Icon -->
  <g transform="translate(150, 240)">
    <path d="M80 60 Q80 40 100 40 L180 40 Q200 40 200 60 L200 120 Q200 140 180 140 L100 140 Q80 140 80 120 Z" 
          fill="white" opacity="0.2"/>
    <circle cx="100" cy="120" r="12" fill="white"/>
    <rect x="110" y="60" width="4" height="60" fill="white"/>
    <circle cx="180" cy="100" r="12" fill="white"/>
    <rect x="190" y="40" width="4" height="60" fill="white"/>
    <path d="M114 60 L194 40 L194 44 L114 64 Z" fill="white"/>
  </g>
  
  <!-- Arrow -->
  <path d="M320 315 L380 315 M370 305 L380 315 L370 325" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Bracket Notation -->
  <g transform="translate(450, 260)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="36" fill="white" font-weight="bold">
      {C4@2, ~@0.5 E4@1.5}@2
    </text>
    <text x="0" y="50" font-family="'Courier New', monospace" font-size="28" fill="white" opacity="0.8">
      [0, 2, 4]@1.scale("C:major")
    </text>
    <text x="0" y="95" font-family="'Courier New', monospace" font-size="28" fill="white" opacity="0.8">
      .sound("piano").velocity(0.8)
    </text>
  </g>
  
  <!-- Title -->
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="white" text-anchor="middle" font-weight="bold">
    MIDI to Bracket Notation
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.9">
    Convert MIDI files for Strudel live coding
  </text>
  
  <!-- Features -->
  <g transform="translate(300, 560)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" opacity="0.7">
      ✓ Key Detection
    </text>
    <text x="180" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" opacity="0.7">
      ✓ Multi-track Support
    </text>
    <text x="380" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" opacity="0.7">
      ✓ Pattern Recognition
    </text>
    <text x="580" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" opacity="0.7">
      ✓ Instrument Mapping
    </text>
  </g>
</svg>
