<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel MIDI Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              noir: {
                900: '#0a0a0a',
                800: '#121212',
                700: '#1a1a1a',
                600: '#2a2a2a',
              },
              gold: {
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
              }
            },
            fontFamily: {
              mono: ['var(--font-mono)'],
              sans: ['var(--font-ui)'],
              display: ['var(--font-display)']
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

      :root {
        --font-display: 'Space Grotesk', sans-serif;
        --font-ui: 'Space Grotesk', sans-serif;
        --font-mono: 'IBM Plex Mono', monospace;
      }

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        font-family: var(--font-ui);
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      ::selection {
        background: rgba(245, 158, 11, 0.22);
        color: #fef3c7;
      }
      
      /* Custom Scrollbar for Noir Theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f59e0b; 
      }

      /* CodeMirror Overrides for Strudel Player */
      .cm-editor {
        height: 100% !important;
        background-color: #0a0a0a !important;
        color: #e4e4e7 !important;
        font-family: var(--font-mono) !important;
      }
      .cm-scroller {
        overflow: auto;
      }
      .cm-gutters {
        background-color: #121212 !important;
        border-right: 1px solid rgba(245, 158, 11, 0.16) !important;
        color: #52525b !important;
      }
      .cm-activeLine, .cm-activeLineGutter {
        background-color: #27272a !important;
      }
      /* Keep Strudel's global draw canvas above the workspace while remaining non-interactive */
      body > canvas {
        z-index: 20 !important;
        pointer-events: none;
      }
      .strudel-pianoroll {
        z-index: 20;
        pointer-events: none;
      }
      /* Inline duration / velocity metadata (e.g. @0.25, :0.82) */
      .cm-inline-meta {
        opacity: inherit;
        font-size: inherit;
        vertical-align: baseline;
        color: inherit;
        background: transparent;
        border-radius: 0;
        padding: 0;
        transition: opacity 0.12s ease, background-color 0.12s ease, font-size 0.12s ease;
      }
      /* Shared tag style presets — driven by data-duration-style on the editor container */
      [data-duration-style="sup"]    .cm-inline-meta { opacity: 0.25; font-size: 8px; vertical-align: super; }
      [data-duration-style="normal"] .cm-inline-meta { opacity: 0.4; font-size: 8px; vertical-align: baseline; }
      [data-duration-style="ghost"]  .cm-inline-meta { opacity: 0.15; font-size: inherit; vertical-align: baseline; }
      [data-duration-style="hidden"] .cm-inline-meta { opacity: 0; font-size: 0; }
      [data-duration-style="hover"] .cm-inline-meta {
        opacity: 0; transition: opacity 0.15s; font-size: 9px; vertical-align: super;
      }
      [data-duration-style="hover"] .cm-inline-meta.cm-inline-meta-hovered {
        opacity: 0.85;
        background: rgba(245,158,11,0.12); border-radius: 3px; padding: 0 2px;
        color: rgba(245,158,11,0.9);
      }
      [data-duration-style="sup"] .cm-inline-meta.cm-inline-meta-active,
      [data-duration-style="normal"] .cm-inline-meta.cm-inline-meta-active,
      [data-duration-style="ghost"] .cm-inline-meta.cm-inline-meta-active,
      [data-duration-style="hidden"] .cm-inline-meta.cm-inline-meta-active,
      [data-duration-style="hover"] .cm-inline-meta.cm-inline-meta-active {
        opacity: 0.95 !important;
        font-size: inherit !important;
        vertical-align: baseline !important;
        color: inherit !important;
        background: rgba(245, 158, 11, 0.10);
        border-radius: 3px;
      }

      /* Note token coloring should win over CodeMirror's inner syntax spans */
      [data-strudel-note-color] {
        color: var(--strudel-note-color) !important;
      }
      [data-strudel-note-color] * {
        color: inherit !important;
      }
      .cm-note-playing {
        transition: box-shadow 120ms linear, background-color 120ms linear;
      }
      .cm-note-playing,
      .cm-note-playing * {
        color: var(--strudel-active-text-color, inherit) !important;
      }

    </style>
</head>
  <body class="bg-noir-900 text-gray-200 overflow-hidden font-sans">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
