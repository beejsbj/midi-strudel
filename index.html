<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel MIDI Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              noir: {
                900: '#0a0a0a',
                800: '#121212',
                700: '#1a1a1a',
                600: '#2a2a2a',
              },
              gold: {
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
              }
            },
            fontFamily: {
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
              sans: ['Inter', 'system-ui', 'sans-serif']
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');
      
      /* Custom Scrollbar for Noir Theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f59e0b; 
      }

      /* CodeMirror Overrides for Strudel Player */
      .cm-editor {
        height: 100% !important;
        background-color: #0a0a0a !important;
        color: #e4e4e7 !important;
        font-family: 'JetBrains Mono', monospace !important;
      }
      .cm-scroller {
        overflow: auto;
      }
      .cm-gutters {
        background-color: #121212 !important;
        border-right: 1px solid #27272a !important;
        color: #52525b !important;
      }
      .cm-activeLine, .cm-activeLineGutter {
        background-color: #27272a !important;
      }
      /* Ensure canvas overlay (pianoroll) is positioned correctly if used by Strudel */
      .strudel-pianoroll {
        z-index: 10;
        pointer-events: none;
      }
      /* Dim @duration annotations (e.g. @0.25) so note names read more clearly */
      /* Regex /@[\d.]+/ only matches the @xx part, so ~ in ~@0.5 stays full opacity */
      .cm-at-duration {
        opacity: 0.25;
        font-size: 8px;
        vertical-align: sub;
      }
      /* Duration tag style presets — driven by data-duration-style on the editor container */
      [data-duration-style="sup"]    .cm-at-duration { vertical-align: super; }
      [data-duration-style="ghost"]  .cm-at-duration { opacity: 0.15; font-size: inherit; vertical-align: baseline; }
      [data-duration-style="hidden"] .cm-at-duration { opacity: 0; font-size: 0; }
      [data-duration-style="badge"]  .cm-at-duration {
        opacity: 0.7; font-size: 9px; vertical-align: baseline;
        background: rgba(245,158,11,0.12); border-radius: 3px; padding: 0 2px;
        color: rgba(245,158,11,0.9);
      }
      [data-duration-style="hover"]       .cm-at-duration { opacity: 0; transition: opacity 0.2s; font-size: 8px; vertical-align: sub; }
      [data-duration-style="hover"]:hover .cm-at-duration { opacity: 0.4; }

      /* Progressive fill animation for markcss preset */
      @keyframes strudel-fill {
        from { background-size: 0% 100%; }
        to   { background-size: 100% 100%; }
      }
      .strudel-mark {
        background-repeat: no-repeat;
        background-position: left center;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@strudel/codemirror": "https://esm.sh/@strudel/codemirror@1.2.2?bundle&external=@strudel/core",
    "@strudel/core": "https://esm.sh/@strudel/core@1.2.2?bundle",
    "@strudel/draw": "https://esm.sh/@strudel/draw@1.2.2?bundle&external=@strudel/core",
    "@strudel/mini": "https://esm.sh/@strudel/mini@1.2.2?bundle&external=@strudel/core",
    "@strudel/soundfonts": "https://esm.sh/@strudel/soundfonts@1.2.2?bundle&external=@strudel/core",
    "@strudel/tonal": "https://esm.sh/@strudel/tonal@1.2.2?bundle&external=@strudel/core",
    "@strudel/transpiler": "https://esm.sh/@strudel/transpiler@1.2.2?bundle&external=@strudel/core",
    "@strudel/webaudio": "https://esm.sh/@strudel/webaudio@1.2.2?bundle&external=@strudel/core"
  }
}
</script>
</head>
  <body class="bg-noir-900 text-gray-200 overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
